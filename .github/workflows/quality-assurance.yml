name: Quality Assurance

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://verein:verein_secret@localhost:5432/vereinsbestellung
  JWT_SECRET: qa-docker-ci-jwt-secret-not-in-blocklist-32chars
  APP_ENCRYPTION_KEY: qa-docker-ci-encryption-key-not-blocked32
  CORS_ORIGIN: http://localhost:5173
  QA_API_BASE: http://localhost:3001/api
  QA_FRONTEND_BASE: http://localhost:5173

jobs:
  quality:
    name: Phase 1–3 – Setup & Qualität
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix backend
          npm ci --prefix frontend

      - name: Generate Prisma client
        run: npm run prisma:generate --prefix backend

      - name: ESLint
        run: npm run qa:lint

      - name: TypeScript Build
        run: npm run qa:typecheck

      - name: Depcheck
        run: npm run qa:depcheck

      - name: Unit Tests & Coverage
        run: npm run qa:unit

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: artifacts/coverage/

  docker-integration:
    name: Phase 4–8 – Docker, Migration, Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root QA deps
        run: npm ci

      - name: Build & start CI stack
        run: |
          docker compose -f docker-compose.ci.yml up -d --build
          npm run qa:wait

      - name: Seed QA data
        run: |
          npm ci --prefix backend
          (cd backend && npx prisma db push && npm run seed)
          npm run qa:seed

      - name: Module scenarios
        run: |
          npm ci --prefix backend
          npm run qa:module-scenarios
          docker compose -f docker-compose.ci.yml restart backend
          npm run qa:wait

      - name: Module integration tests
        run: npm run qa:module-tests

      - name: API tests
        run: npm run qa:api

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: E2E tests
        run: npm run qa:e2e

      - name: Performance baseline
        run: npm run qa:performance

      - name: Security audit
        run: npm run qa:security

      - name: Generate QA report
        if: always()
        run: npm run qa:report

      - name: Collect container logs
        if: always()
        run: docker compose -f docker-compose.ci.yml logs > artifacts/container-logs.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-artifacts
          path: |
            artifacts/
            tests/e2e/playwright-report/

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v
