name: Quality Assurance

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://festschmiede:qa-ci-postgres-password-secure@localhost:5432/festschmiede
  JWT_SECRET: qa-docker-ci-jwt-secret-not-in-blocklist-32chars
  APP_ENCRYPTION_KEY: qa-docker-ci-encryption-key-not-blocked32
  CORS_ORIGIN: http://localhost:5173
  QA_API_BASE: http://localhost:3001/default/api
  QA_PLATFORM_API_BASE: http://localhost:3001/api
  QA_TENANT_SLUG: default
  QA_FRONTEND_BASE: http://localhost:5173
  QA_TENANT_FRONTEND_BASE: http://localhost:5173/default/
  QA_PLATFORM_ADMIN_EMAIL: platform@festschmiede.local
  QA_PLATFORM_ADMIN_PASSWORD: qa-docker-ci-platform-admin-password
  QA_MAILPIT_BASE: http://localhost:8025

jobs:
  quality:
    name: Statische Qualität & Installer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix backend
          npm ci --prefix frontend

      - name: Generate Prisma client
        run: npm run prisma:generate --prefix backend

      - name: ESLint
        run: npm run qa:lint

      - name: Tenant Prisma guard
        run: npm run qa:tenant-guard

      - name: TypeScript Build
        run: npm run qa:typecheck

      - name: Depcheck
        run: npm run qa:depcheck

      - name: Documentation linkcheck
        run: npm run qa:linkcheck

      - name: Unit Tests & Coverage
        run: npm run qa:unit

      - name: Installer tests
        run: npm run qa:installer

      - name: Migration tests (fresh DB + upgrade)
        run: bash scripts/qa/test-migrations.sh

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: artifacts/coverage/

  integration:
    name: Docker-Stack, API & Smoke-E2E
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root QA deps
        run: npm ci

      - name: Build & start CI stack
        run: |
          docker compose -f docker-compose.ci.yml up -d --build
          npm run qa:wait

      - name: Seed QA data
        run: |
          npm ci --prefix backend
          (cd backend && npx prisma generate && npm run seed)
          npm run qa:seed

      - name: Module scenarios
        run: |
          npm ci --prefix backend
          npm run prisma:generate --prefix backend
          npm run qa:module-scenarios
          docker compose -f docker-compose.ci.yml restart backend
          npm run qa:wait

      - name: Module integration tests
        run: npm run qa:module-tests

      - name: API tests
        run: npm run qa:api

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Smoke E2E (bestehender Mandant)
        run: npm run qa:e2e

      - name: Security audit
        run: npm run qa:security

      - name: Generate QA report
        if: always()
        run: npm run qa:report

      - name: Collect container logs
        if: always()
        run: docker compose -f docker-compose.ci.yml logs > artifacts/container-logs.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-artifacts
          path: |
            artifacts/
            tests/e2e/playwright-report/

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

  user-journey:
    name: Realistische Nutzerreise (E2E)
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix backend

      - name: Start CI stack
        run: |
          docker compose -f docker-compose.ci.yml up -d --build
          npm run qa:wait

      - name: Prisma migrate & platform seed
        run: |
          npm run prisma:generate --prefix backend
          (cd backend && npm run seed)

      - name: Mandantenbewerbungen für Nutzerreise aktivieren
        run: npm run qa:prepare-journey

      - name: Backend neu starten (Plattform-Settings-Cache)
        run: |
          docker compose -f docker-compose.ci.yml restart backend
          npm run qa:wait

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Nutzerreise – Bewerbung bis Bestellungen
        run: PLAYWRIGHT_WORKERS=1 npm run qa:e2e:journey

      - name: Upload journey artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: user-journey-artifacts
          path: |
            artifacts/playwright/
            artifacts/container-logs.txt

      - name: Collect container logs on failure
        if: failure()
        run: mkdir -p artifacts && docker compose -f docker-compose.ci.yml logs > artifacts/container-logs.txt

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

  performance:
    name: Performance-Baseline
    runs-on: ubuntu-latest
    needs: integration
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Start CI stack
        run: |
          docker compose -f docker-compose.ci.yml up -d --build
          npm run qa:wait
          npm ci --prefix backend
          (cd backend && npx prisma generate && npm run seed)
          npm run qa:seed

      - name: Performance baseline
        run: npm run qa:performance

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v
