name: Release Validation

on:
  release:
    types: [created, published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to validate'
        required: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}

      - name: Trigger full QA pipeline
        run: echo "Release validation delegates to quality-assurance workflow gates"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix backend
          npm ci --prefix frontend

      - name: Generate Prisma client
        run: npm run prisma:generate --prefix backend

      - name: Quality gate
        run: |
          npm run qa:typecheck
          npm run qa:unit

      - name: Docker stack validation
        env:
          DATABASE_URL: postgresql://verein:verein_secret@localhost:5432/vereinsbestellung
          JWT_SECRET: qa-docker-ci-jwt-secret-not-in-blocklist-32chars
          APP_ENCRYPTION_KEY: qa-docker-ci-encryption-key-not-blocked32
        run: |
          docker compose -f docker-compose.ci.yml up -d --build
          npm run qa:wait
          (cd backend && npm run seed)
          npm run qa:seed
          npm run qa:module-scenarios
          docker compose -f docker-compose.ci.yml restart backend
          npm run qa:wait
          npm run qa:api
          npx playwright install chromium --with-deps
          npm run qa:e2e
          npm run qa:security

      - name: Release gate report
        if: always()
        run: |
          npm run qa:report || true
          test -f artifacts/qa-summary.json

      - name: Upload release validation artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-validation
          path: artifacts/

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v
