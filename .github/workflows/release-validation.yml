name: Release Validation

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to validate'
        required: false

concurrency:
  group: release-${{ github.event.release.tag_name || inputs.tag || github.sha }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  DATABASE_URL: postgresql://festschmiede:qa-ci-postgres-password-secure@localhost:5432/festschmiede
  JWT_SECRET: qa-docker-ci-jwt-secret-not-in-blocklist-32chars
  APP_ENCRYPTION_KEY: qa-docker-ci-encryption-key-not-blocked32
  CORS_ORIGIN: http://localhost:5173
  QA_FRONTEND_BASE: http://localhost:5173
  QA_PLATFORM_ADMIN_EMAIL: platform@festschmiede.local
  QA_PLATFORM_ADMIN_PASSWORD: qa-docker-ci-platform-admin-password
  QA_MAILPIT_BASE: http://localhost:8025

jobs:
  validate:
    name: Release-Gate (Build + Nutzerreise)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix backend
          npm ci --prefix frontend

      - name: Generate Prisma client
        run: npm run prisma:generate --prefix backend

      - name: Quality gate (schnell)
        run: |
          npm run qa:typecheck
          npm run qa:unit

      - name: Docker stack + Nutzerreise
        run: |
          docker compose -f docker-compose.ci.yml up -d --build
          npm run qa:wait
          (cd backend && npm run seed)
          npm run qa:prepare-journey
          docker compose -f docker-compose.ci.yml restart backend
          npm run qa:wait
          npx playwright install chromium --with-deps
          npm run qa:e2e:journey
          npm run qa:security

      - name: Release gate report
        if: always()
        run: npm run qa:report || true

      - name: Upload release validation artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-validation
          path: artifacts/

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

  build-and-push:
    name: Docker Images (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: backend
            file: backend/Dockerfile
          - name: frontend
            context: frontend
            file: frontend/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}

      - name: Resolve release tag
        id: release
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.name }}
          tags: |
            type=raw,value=${{ steps.release.outputs.tag }},enable=${{ steps.release.outputs.tag != '' }}
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}},enable=${{ github.event_name == 'release' }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.context }}
          file: ./${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || '' }}
            VITE_WS_URL=${{ vars.VITE_WS_URL || '' }}
            VITE_TURNSTILE_SITE_KEY=${{ vars.VITE_TURNSTILE_SITE_KEY || '' }}
