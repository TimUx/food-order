services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: verein
      POSTGRES_PASSWORD: verein_secret
      POSTGRES_DB: vereinsbestellung
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verein -d vereinsbestellung"]
      interval: 5s
      timeout: 5s
      retries: 12

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://verein:verein_secret@postgres:5432/vereinsbestellung
      JWT_SECRET: qa-docker-ci-jwt-secret-not-in-blocklist-32chars
      JWT_EXPIRES_IN: 8h
      CORS_ORIGIN: http://localhost:5173
      APP_ENCRYPTION_KEY: qa-docker-ci-encryption-key-not-blocked32
      PLATFORM_ADMIN_PASSWORD: qa-docker-ci-platform-admin-password
      MODULES_DIR: /app/modules
      PLUGINS_DIR: /app/plugins
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3001
        VITE_WS_URL: http://localhost:3001
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 12
