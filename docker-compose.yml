services:
  postgres:
    image: postgres:16-alpine
    container_name: vereins-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-verein}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-verein_secret}
      POSTGRES_DB: ${POSTGRES_DB:-vereinsbestellung}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Postgres nur intern – nicht nach außen exponieren (M7)
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-verein} -d ${POSTGRES_DB:-vereinsbestellung}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          memory: 256M

  backend:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/timux/festschmiede}/backend:${IMAGE_TAG:-latest}
    container_name: vereins-backend
    restart: unless-stopped
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-verein}:${POSTGRES_PASSWORD:-verein_secret}@postgres:5432/${POSTGRES_DB:-vereinsbestellung}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-long-random-string}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      MULTI_TENANT_ENABLED: ${MULTI_TENANT_ENABLED:-false}
      PLATFORM_DOMAIN: ${PLATFORM_DOMAIN:-localhost}
      PLATFORM_BASE_DOMAIN: ${PLATFORM_DOMAIN:-${PLATFORM_BASE_DOMAIN:-localhost}}
      PLATFORM_WWW_DOMAIN: ${PLATFORM_WWW_DOMAIN:-}
      PLATFORM_WILDCARD_DOMAIN: ${PLATFORM_WILDCARD_DOMAIN:-}
      PLATFORM_API_DOMAIN: ${PLATFORM_API_DOMAIN:-}
      PLATFORM_ALLOWED_ORIGINS: ${PLATFORM_ALLOWED_ORIGINS:-}
      DEFAULT_TENANT_SLUG: ${DEFAULT_TENANT_SLUG:-default}
      TRUSTED_PROXY_HOPS: ${TRUSTED_PROXY_HOPS:-1}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-}
      LOG_FORMAT: ${LOG_FORMAT:-text}
    ports:
      - "3001:3001"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          memory: 128M

  frontend:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/timux/festschmiede}/frontend:${IMAGE_TAG:-latest}
    container_name: vereins-frontend
    restart: unless-stopped
    pull_policy: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
        reservations:
          memory: 64M

volumes:
  postgres_data:
  uploads_data:

networks:
  internal:
    name: ${FESTSCHMIEDE_INTERNAL_NETWORK:-festschmiede_internal}
    driver: bridge
