# Produktions-Compose mit Traefik (Per-Host-TLS) – Phase 6
# Nutzung: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Voraussetzungen:
# - DNS: A/AAAA für die in TRAEFIK_ROUTER_RULE gewählten Hostnamen
# - .env: ACME_EMAIL, PLATFORM_DOMAIN, TRAEFIK_ROUTER_RULE, JWT_SECRET, …
# - Keine Wildcard-Zertifikate: Traefik erzeugt pro Host ein LE-Zertifikat (HTTP-01)

services:
  traefik:
    image: traefik:v3.3
    container_name: festschmiede-traefik
    restart: unless-stopped
    command:
      - --api.dashboard=false
      - --ping=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=${FESTSCHMIEDE_PROXY_NETWORK:-festschmiede_public}
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --log.level=INFO
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt_data:/letsencrypt
    networks:
      - public
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  postgres:
    networks:
      - internal

  backend:
    ports: !reset []
    expose:
      - "3001"
    environment:
      MULTI_TENANT_ENABLED: ${MULTI_TENANT_ENABLED:-true}
      PLATFORM_DOMAIN: ${PLATFORM_DOMAIN:-localhost}
      PLATFORM_BASE_DOMAIN: ${PLATFORM_DOMAIN:-${PLATFORM_BASE_DOMAIN:-localhost}}
      PLATFORM_WWW_DOMAIN: ${PLATFORM_WWW_DOMAIN:-}
      PLATFORM_APP_DOMAIN: ${PLATFORM_APP_DOMAIN:-}
      PLATFORM_API_DOMAIN: ${PLATFORM_API_DOMAIN:-}
      PLATFORM_ALLOWED_ORIGINS: ${PLATFORM_ALLOWED_ORIGINS:-}
      DEFAULT_TENANT_SLUG: ${DEFAULT_TENANT_SLUG:-default}
      TRUSTED_PROXY_HOPS: ${TRUSTED_PROXY_HOPS:-2}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      REDIS_URL: ${REDIS_URL:-}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3001/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    ports: !reset []
    expose:
      - "80"
    networks:
      - internal
      - public
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    labels:
      - traefik.enable=true
      - traefik.docker.network=${FESTSCHMIEDE_PROXY_NETWORK:-festschmiede_public}
      - traefik.http.routers.festschmiede.rule=${TRAEFIK_ROUTER_RULE}
      - traefik.http.routers.festschmiede.entrypoints=websecure
      - traefik.http.routers.festschmiede.tls=true
      - traefik.http.routers.festschmiede.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-le}
      - traefik.http.services.festschmiede.loadbalancer.server.port=80
      - traefik.http.middlewares.festschmiede-headers.headers.sslredirect=true
      - traefik.http.middlewares.festschmiede-headers.headers.stsSeconds=31536000
      - traefik.http.routers.festschmiede.middlewares=festschmiede-headers

  redis:
    image: redis:7-alpine
    container_name: festschmiede-redis
    restart: unless-stopped
    profiles:
      - redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  public:
    name: ${FESTSCHMIEDE_PROXY_NETWORK:-festschmiede_public}
  internal:
    name: ${FESTSCHMIEDE_INTERNAL_NETWORK:-festschmiede_internal}
    internal: true

volumes:
  letsencrypt_data:
  redis_data:
